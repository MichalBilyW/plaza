# =============================================================================
# CI Pipeline - Runs on every push and PR
# Prevents broken code from reaching production
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Quality Checks (fast, runs first)
  # ---------------------------------------------------------------------------
  quality:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      # TypeCheck dočasně disabled - projekt má existující TS chyby
      # které nebrání buildu, ale typecheck je přísný
      # TODO: opravit TS chyby a povolit typecheck
      # - name: TypeScript check
      #   run: npx nuxi typecheck

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NUXT_MONGO_URI: mongodb://localhost:27017/plaza_test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  # ---------------------------------------------------------------------------
  # Build Test (ensures production build works)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_SITE_URL: https://ocplazaliberec.cz

      - name: Check build output
        run: |
          test -d .output || (echo "Build output missing!" && exit 1)
          test -f .output/server/index.mjs || (echo "Server entrypoint missing!" && exit 1)
